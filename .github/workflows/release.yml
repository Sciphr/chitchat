name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install meson and ninja
        run: python -m pip install --upgrade pip meson ninja

      - name: Force MSVC for bundled native builds
        shell: pwsh
        run: |
          "CC=cl" >> $env:GITHUB_ENV
          "CXX=cl" >> $env:GITHUB_ENV
          "AR=lib" >> $env:GITHUB_ENV
          "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=link" >> $env:GITHUB_ENV
          $filteredPath = ($env:PATH -split ';' | Where-Object { $_ -and $_ -notlike 'C:\Strawberry*' }) -join ';'
          "PATH=$filteredPath" >> $env:GITHUB_ENV

      - name: Install app dependencies
        run: npm ci

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ChitChat ${{ github.ref_name }}"
          releaseBody: "See the assets below for this release."
          releaseDraft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
